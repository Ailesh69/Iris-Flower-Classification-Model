<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Predict — Iris Classifier</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="card">
    <h1>🌸 Predict Iris Species</h1>
    <p class="subtitle">Enter the flower's measurements (in centimeters).</p>

    <form id="predict-form">
      <label>
        Sepal length (cm)
        <input type="number" name="sepal_length" step="0.1" value="5.1" required />
      </label>
      <label>
        Sepal width (cm)
        <input type="number" name="sepal_width" step="0.1" value="3.5" required />
      </label>
      <label>
        Petal length (cm)
        <input type="number" name="petal_length" step="0.1" value="1.4" required />
      </label>
      <label>
        Petal width (cm)
        <input type="number" name="petal_width" step="0.1" value="0.2" required />
      </label>

      <button type="submit" class="btn">Predict</button>
    </form>

    <div id="result" class="result hidden"></div>

    <a class="back-link" href="/static/index.html">← Back</a>
  </div>

  <script>
    const form = document.getElementById("predict-form");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      result.classList.remove("hidden", "error");
      result.textContent = "Predicting…";

      const data = Object.fromEntries(
        [...new FormData(form)].map(([k, v]) => [k, parseFloat(v)])
      );

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        if (!res.ok) throw new Error("Server responded with " + res.status);

        const json = await res.json();
        result.innerHTML =
          "Predicted species: <strong>" + json.predicted_species + "</strong>";
      } catch (err) {
        result.classList.add("error");
        result.textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
